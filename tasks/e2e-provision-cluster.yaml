apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: e2e-provision-cluster
  annotations:
    tekton.dev/title: "Provision Ephemeral Cluster"
spec:
  params:
    - name: eaasSpaceSecretRef
      type: string
      description: EaaS space secret reference
    - name: instanceType
      type: string
      default: m5.2xlarge
      description: EC2 instance type for cluster nodes
    - name: fips
      type: string
      default: "true"
      description: Enable FIPS on cluster nodes
    - name: imageContentSources
      type: string
      description: ICSP YAML block for image mirrors
  results:
    - name: clusterName
      description: Name of the provisioned ephemeral cluster
      value: "$(steps.create-cluster.results.clusterName)"
  steps:
    - name: get-supported-versions
      ref:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(params.eaasSpaceSecretRef)
    - name: pick-version
      ref:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
      params:
        - name: prefix
          value: "$(steps.get-supported-versions.results.versions[0])."
    - name: create-cluster
      ref:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(params.eaasSpaceSecretRef)
        - name: version
          value: "$(steps.pick-version.results.version)"
        - name: instanceType
          value: $(params.instanceType)
        - name: fips
          value: $(params.fips)
        - name: imageContentSources
          value: $(params.imageContentSources)
