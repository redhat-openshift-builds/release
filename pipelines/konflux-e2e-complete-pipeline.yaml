apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: e2e-openshift-builds
spec:
  description: |
    An integration test which provisions an ephemeral Hypershift cluster and deploys an Operator
    bundle from a Konflux snapshot. Enhanced with custom rh-operator builds and auto-generated BuildRuns.
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      default: '{"components": [{"name":"test-app", "containerImage": "quay.io/example/repo:latest"}]}'
      type: string
    - description: Builds for OpenShift Version
      name: VERSION
      default: ""
      type: string
  tasks:
    - name: provision-eaas-space
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      taskSpec:
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
          - name: pick-version
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
            params:
              - name: prefix
                value: "$(steps.get-supported-versions.results.versions[0])."
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: version
                value: "$(steps.pick-version.results.version)"
              - name: instanceType
                value: m5.2xlarge
              - name: fips
                value: "true"
              - name: imageContentSources
                value: |
                    - source: registry.redhat.io/openshift-builds/openshift-builds-rhel9-operator
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-operator$(params.VERSION)
                    - source: registry.redhat.io/openshift-builds/openshift-builds-operator-bundle
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-operator-bundle$(params.VERSION)
                    - source: registry.redhat.io/openshift-builds/openshift-builds-controller-rhel9
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-controller$(params.VERSION)
                    - source: registry.redhat.io/openshift-builds/openshift-builds-image-processing-rhel9
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-image-processing$(params.VERSION)
                    - source: registry.redhat.io/openshift-builds/openshift-builds-image-bundler-rhel9
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-image-bundler$(params.VERSION)
                    - source: registry.redhat.io/openshift-builds/openshift-builds-git-cloner-rhel9
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-git-cloner$(params.VERSION)
                    - source: registry.redhat.io/openshift-builds/openshift-builds-waiters-rhel9
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-waiter$(params.VERSION)
                    - source: registry.redhat.io/openshift-builds/openshift-builds-webhook-rhel9
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-webhook$(params.VERSION)
                    - source: registry.redhat.io/openshift-builds/openshift-builds-shared-resource-rhel9
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-shared-resource$(params.VERSION)
                    - source: registry.redhat.io/openshift-builds/openshift-builds-shared-resource-webhook-rhel9
                      mirrors:
                        - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-shared-resource-webhook$(params.VERSION)
    - name: verify-fips-enabled-on-nodes
      description: Verify that FIPS is enabled on cluster nodes
      runAfter:
        - provision-cluster
      taskSpec:
        volumes:
          - name: credentials
            emptyDir: { }
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-cluster.results.clusterName)"
              - name: credentials
                value: credentials
          - name: check-fips
            image: quay.io/openshift-pipeline/ci:latest
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            script: |
              #!/usr/bin/env bash
              set -ex -u -o pipefail
              
              echo "Verifying FIPS compliance on cluster nodes..."
              
              # Get all worker nodes
              WORKER_NODES=$(oc get nodes -l node-role.kubernetes.io/worker -o jsonpath='{.items[*].metadata.name}')
              
              if [ -z "$WORKER_NODES" ]; then
                  echo "No worker nodes found. Checking all nodes..."
                  WORKER_NODES=$(oc get nodes -o jsonpath='{.items[*].metadata.name}')
              fi
              
              echo "Found nodes: $WORKER_NODES"
              
              # Check FIPS on each node
              for NODE in $WORKER_NODES; do
                  echo "Checking FIPS status on node: $NODE"
                  
                  # Create a debug pod to check FIPS status
                  FIPS_STATUS=$(oc debug node/$NODE --image=quay.io/openshift-pipeline/ci:latest -- chroot /host cat /proc/sys/crypto/fips_enabled 2>/dev/null || echo "Failed to check")
                  
                  echo "FIPS status on $NODE: $FIPS_STATUS"
                  
                  if [ "$FIPS_STATUS" = "1" ]; then
                      echo "PASS: Node $NODE has FIPS enabled"
                  elif [ "$FIPS_STATUS" = "0" ]; then
                      echo "FAIL: Node $NODE has FIPS disabled"
                      exit 1
                  else
                      echo "FAIL: Failed to check FIPS status on node $NODE: $FIPS_STATUS"
                      exit 1
                  fi
              done
              
              echo "All nodes have FIPS enabled"
    - name: install-openshift-pipelines
      runAfter:
        - verify-fips-enabled-on-nodes
      taskSpec:
        volumes:
          - name: credentials
            emptyDir: { }
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-cluster.results.clusterName)"
              - name: credentials
                value: credentials
          - name: install-pipelines
            image: registry.redhat.io/openshift4/ose-cli:latest
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            script: |
              #!/usr/bin/env bash
              set -ex -u -o pipefail
              
              oc apply -f - <<EOF
              apiVersion: operators.coreos.com/v1alpha1
              kind: Subscription
              metadata:
                name: openshift-pipelines-operator
                namespace: openshift-operators
              spec:
                channel: latest
                name: openshift-pipelines-operator-rh
                source: redhat-operators
                sourceNamespace: openshift-marketplace
              EOF
              
              NAMESPACE="openshift-operators"
              DEPLOYMENTS=(
                  "openshift-pipelines-operator"
                  "tekton-operator-webhook"
              )
              
              echo "=== Waiting for OpenShift Pipelines installation ==="
              sleep 60
              
              for DEPLOYMENT in "${DEPLOYMENTS[@]}"; do
                  echo "=== Waiting for deployment: $DEPLOYMENT ==="
                  
                  if ! oc get deployment "$DEPLOYMENT" --namespace="$NAMESPACE" >/dev/null 2>&1; then
                      echo "ERROR: Deployment $DEPLOYMENT does not exist"
                      oc get deployments -n $NAMESPACE
                      exit 1
                  fi
                  
                  if ! oc wait deployment "$DEPLOYMENT" --namespace="$NAMESPACE" --for="condition=available" --timeout="180s"; then
                      echo "ERROR: Deployment $DEPLOYMENT failed to become available"
                      oc get deployment "$DEPLOYMENT" --namespace="$NAMESPACE" -o yaml
                      exit 1
                  fi
                  
                  echo "Deployment $DEPLOYMENT is available"
              done
              
              echo "OpenShift Pipelines installed successfully"
    - name: deploy-operator
      runAfter:
        - install-openshift-pipelines
      taskSpec:
        volumes:
          - name: credentials
            emptyDir: { }
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-cluster.results.clusterName)"
              - name: credentials
                value: credentials
          - name: operator-bundle-install
            image: registry.redhat.io/openshift4/ose-cli:latest
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            script: |
              #!/usr/bin/env bash
              set -ex -u -o pipefail
              
              echo "Installing operator-sdk and dependencies"
              dnf -y install jq
              export OPERATOR_SDK_VERSION=1.36.1
              export ARCH=$(case $(uname -m) in x86_64) echo -n amd64 ;; aarch64) echo -n arm64 ;; *) echo -n $(uname -m) ;; esac)
              export OPERATOR_SDK_DL_URL=https://github.com/operator-framework/operator-sdk/releases/download/v${OPERATOR_SDK_VERSION}
              curl -Lo /usr/local/bin/operator-sdk ${OPERATOR_SDK_DL_URL}/operator-sdk_linux_${ARCH}
              chmod +x /usr/local/bin/operator-sdk
              
              echo "=== Extracting bundle image from snapshot ==="
              echo "SNAPSHOT content:"
              echo "$SNAPSHOT" | jq .
              
              # First try with VERSION parameter if provided
              KONFLUX_COMPONENT_NAME=openshift-builds-operator-bundle$(params.VERSION)
              echo "Searching for component: ${KONFLUX_COMPONENT_NAME}"
              export BUNDLE_IMAGE="$(jq -r --arg component_name "$KONFLUX_COMPONENT_NAME" '.components[] | select(.name == $component_name) | .containerImage' <<< "$SNAPSHOT")"
              
              # If not found and VERSION is empty, try to find any bundle component
              if [ -z "$BUNDLE_IMAGE" ]; then
                  echo "Component not found with name: ${KONFLUX_COMPONENT_NAME}"
                  echo "Trying to find any bundle component matching pattern..."
                  export BUNDLE_IMAGE="$(jq -r '.components[] | select(.name | startswith("openshift-builds-operator-bundle")) | .containerImage' <<< "$SNAPSHOT" | head -n1)"
              fi
              
              # Validate bundle image was found
              if [ -z "$BUNDLE_IMAGE" ]; then
                  echo "ERROR: Could not find bundle image in snapshot!"
                  echo "Available components:"
                  jq -r '.components[] | "  - \(.name): \(.containerImage)"' <<< "$SNAPSHOT"
                  exit 1
              fi
              
              echo "Found bundle image: ${BUNDLE_IMAGE}"
              
              echo "=== Installing OpenShift Builds operator ==="
              builds_install_ns="builds-e2e-test"
              oc create namespace ${builds_install_ns} --dry-run=client -o yaml | oc apply -f -
              /usr/local/bin/operator-sdk run bundle --timeout=5m --namespace "${builds_install_ns}" "$BUNDLE_IMAGE" --verbose
              
              echo "Operator deployed successfully"
    - name: run-e2e-tests
      description: Clone Shipwright repo and run e2e tests against deployed operator with custom rh-operator builds
      runAfter:
        - deploy-operator
      taskSpec:
        volumes:
          - name: credentials
            emptyDir: { }
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-cluster.results.clusterName)"
              - name: credentials
                value: credentials
          - name: run-e2e-tests
            image: quay.io/openshift-pipeline/ci:latest
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: OPERATOR_NAMESPACE
                value: "builds-e2e-test"
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            script: |
              #!/usr/bin/env bash
              set -ex -u -o pipefail
              
              # Install prerequisites
              dnf -y install git golang jq gawk
              curl -Lo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
              chmod +x /usr/local/bin/yq
              go install github.com/onsi/ginkgo/v2/ginkgo@latest
              export PATH=$PATH:$(go env GOPATH)/bin
              # Clone Shipwright test framework
              SHIPWRIGHT_VERSION="v0.13.0"
              mkdir -p /workspace/shipwright-build
              cd /workspace/shipwright-build
              git init
              git remote add origin https://github.com/shipwright-io/build.git
              git config core.sparseCheckout true
              cat > .git/info/sparse-checkout << EOF
              test/
              samples/
              go.mod
              go.sum
              pkg/
              EOF
              git fetch --depth 1 origin ${SHIPWRIGHT_VERSION}
              git checkout FETCH_HEAD
              
              # Clone rh-operator repository
              mkdir -p /workspace/rh-operator
              cd /workspace/rh-operator
              git clone https://github.com/anchi205/rh-operator.git .
              
              # Check if config/shipwright/samples exists
              if [ ! -d "config/shipwright/samples" ]; then
                echo "ERROR: config/shipwright/samples directory not found!"
                find . -name "*sample*" -type d 2>/dev/null || echo "No sample directories found"
                exit 1
              fi
              cd /workspace/rh-operator/config/shipwright/samples
              mkdir -p /tmp/custom-samples/builds /tmp/custom-samples/buildruns
              
              BUILD_FILES=$(find . -name "*.yaml" -type f | head -20)
              if [ -z "$BUILD_FILES" ]; then
                echo "ERROR: No build YAML files found in repository!"
                exit 1
              fi
              
              BUILD_COUNT=0
              > /tmp/build-mapping.txt
              
              # Process each build file
              for build_file in $BUILD_FILES; do
                BUILD_COUNT=$((BUILD_COUNT + 1))
                BASE_NAME=$(basename "$build_file" .yaml)
                
                # Extract Build YAML from ConsoleYAMLSample (our rh-operator uses this format)
                if yq eval '.kind' "$build_file" | grep -q "ConsoleYAMLSample"; then
                  yq eval '.spec.yaml' "$build_file" > "/tmp/custom-samples/builds/${BASE_NAME}.yaml"
                  ACTUAL_BUILD_FILE="/tmp/custom-samples/builds/${BASE_NAME}.yaml"
                else
                  cp "$build_file" "/tmp/custom-samples/builds/${BASE_NAME}.yaml"
                  ACTUAL_BUILD_FILE="/tmp/custom-samples/builds/${BASE_NAME}.yaml"
                fi
                
                BUILD_NAME=$(yq eval '.metadata.name // "custom-build-'$BUILD_COUNT'"' "$ACTUAL_BUILD_FILE")
                STRATEGY_NAME=$(yq eval '.spec.strategy.name // "buildah"' "$ACTUAL_BUILD_FILE")
                BUILDRUN_NAME="${BUILD_NAME}-run"
                BUILDRUN_FILE="/tmp/custom-samples/buildruns/${BASE_NAME}-buildrun.yaml"
                
                cat > "$BUILDRUN_FILE" << EOFBUILDRUN
              apiVersion: shipwright.io/v1beta1
              kind: BuildRun
              metadata:
                name: ${BUILDRUN_NAME}
                labels:
                  build.shipwright.io/name: ${BUILD_NAME}
                  build.shipwright.io/strategy: ${STRATEGY_NAME}
                  e2e-test: "custom"
                  generated-by: "rh-operator-pipeline"
                  source: "rh-operator"
              spec:
                build:
                  name: ${BUILD_NAME}
                timeout: 15m
                serviceAccount: pipeline
              EOFBUILDRUN
                echo "${BASE_NAME}:${BUILD_NAME}:${BUILDRUN_NAME}:${STRATEGY_NAME}" >> /tmp/build-mapping.txt
              done
              
              echo "Processed $BUILD_COUNT builds and generated corresponding BuildRuns"
              TEMP_REGISTRY_PLACEHOLDER="__TEMP_REGISTRY_PLACEHOLDER__"
              # Replace all common registry patterns with a placeholder (will be replaced with actual registry later)
              find /tmp/custom-samples/builds -name "*.yaml" -type f -exec sed -i "s|image-registry\.openshift-image-registry\.svc:5000/[^/:]*|${TEMP_REGISTRY_PLACEHOLDER}|g" {} \;
              find /tmp/custom-samples/builds -name "*.yaml" -type f -exec sed -i "s|registry\.registry\.svc\.cluster\.local:5000/[^/:]*|${TEMP_REGISTRY_PLACEHOLDER}|g" {} \;
              find /tmp/custom-samples/builds -name "*.yaml" -type f -exec sed -i "s|ttl\.sh/[^:]*|${TEMP_REGISTRY_PLACEHOLDER}/custom-image|g" {} \;
              find /tmp/custom-samples/builds -name "*.yaml" -type f -exec sed -i "s|quay\.io/[^/:]*|${TEMP_REGISTRY_PLACEHOLDER}|g" {} \;
              find /tmp/custom-samples/builds -name "*.yaml" -type f -exec sed -i "s|docker\.io/[^/:]*|${TEMP_REGISTRY_PLACEHOLDER}|g" {} \;
              # Also update buildruns
              find /tmp/custom-samples/buildruns -name "*.yaml" -type f -exec sed -i "s|image-registry\.openshift-image-registry\.svc:5000/[^/:]*|${TEMP_REGISTRY_PLACEHOLDER}|g" {} \;
              find /tmp/custom-samples/buildruns -name "*.yaml" -type f -exec sed -i "s|registry\.registry\.svc\.cluster\.local:5000/[^/:]*|${TEMP_REGISTRY_PLACEHOLDER}|g" {} \;
              find /tmp/custom-samples/buildruns -name "*.yaml" -type f -exec sed -i "s|ttl\.sh/[^:]*|${TEMP_REGISTRY_PLACEHOLDER}/custom-image|g" {} \;
              
              # Configuration
              OPERATOR_NAMESPACE="${OPERATOR_NAMESPACE:-builds-e2e-test}"
              WORK_DIR="/tmp/e2e-test-override"
              TEST_TIMEOUT="45m"
              
              # Always use dedicated test registry for reliability
              # OpenShift internal registry often has auth/permission issues for e2e tests
              TEST_REGISTRY="registry.registry.svc.cluster.local:5000"
              EXTERNAL_REGISTRY="$TEST_REGISTRY"
              USE_TEST_REGISTRY=true
              
              
              DOWNSTREAM_OPERATOR_PACKAGE="openshift-builds-operator"
              DOWNSTREAM_API_VERSION="shipwright.io/v1beta1"
              DOWNSTREAM_SOURCE_REPO="https://github.com/anchi205/rh-operator.git"
              DOWNSTREAM_BUILD_STRATEGIES=("buildah-shipwright-managed-push" "buildpacks-v3" "buildpacks-v3-heroku" "source-to-image")
              SKIP_TEST_LABELS=("PipelineRun" "BuildKit" "VulnerabilityScanning" "MultiArch" "Kaniko")
              
              # Setup test environment
              export TEST_NAMESPACE="$OPERATOR_NAMESPACE"
              export TEST_IMAGE_REPO="${EXTERNAL_REGISTRY}/${OPERATOR_NAMESPACE}"
              export TEST_IMAGE_REPO_INSECURE="true"  # Test registry doesn't use TLS
              export TEST_PRIVATE_REPO="false"
              export TEST_E2E_VERIFY_TEKTONOBJECTS="true"
              export TEST_E2E_SERVICEACCOUNT_NAME="pipeline"
              export TEST_E2E_TIMEOUT_MULTIPLIER="5"  # Increased for better reliability
              export TEST_E2E_SKIP_IMAGE_DIGEST_VALIDATION="false"  # Try to validate, fallback if needed
              export DOWNSTREAM_OPERATOR_PACKAGE="$DOWNSTREAM_OPERATOR_PACKAGE"
              export DOWNSTREAM_API_VERSION="$DOWNSTREAM_API_VERSION"
              
              echo "Test environment: registry=$TEST_IMAGE_REPO, namespace=$TEST_NAMESPACE"
              
              # Pre-flight checks
              if ! oc get namespace "$OPERATOR_NAMESPACE" >/dev/null 2>&1; then
                echo "ERROR: Namespace $OPERATOR_NAMESPACE does not exist!"
                exit 1
              fi
              
              # Wait for operator pods to be running
              TIMEOUT=180
              ELAPSED=0
              RUNNING_PODS=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                RUNNING_PODS=$(oc get pods -n "$OPERATOR_NAMESPACE" --field-selector=status.phase=Running -o name 2>/dev/null | wc -l)
                if [ $RUNNING_PODS -gt 0 ]; then
                  break
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              
              if [ $RUNNING_PODS -eq 0 ]; then
                echo "ERROR: No operator pods running after ${TIMEOUT}s"
                oc get pods -n "$OPERATOR_NAMESPACE" -o wide
                exit 1
              fi
              
              echo "Waiting for CRDs to be available..."
              REQUIRED_CRDS=("builds.shipwright.io" "buildruns.shipwright.io" "buildstrategies.shipwright.io" "clusterbuildstrategies.shipwright.io")
              
              # Wait up to 2 minutes for CRDs to be created
              for crd in "${REQUIRED_CRDS[@]}"; do
                TIMEOUT=120
                ELAPSED=0
                while [ $ELAPSED -lt $TIMEOUT ]; do
                  if oc get crd "$crd" >/dev/null 2>&1; then
                    break
                  fi
                  sleep 5
                  ELAPSED=$((ELAPSED + 5))
                done
                
                if ! oc get crd "$crd" >/dev/null 2>&1; then
                  echo "ERROR: Required CRD not found after ${TIMEOUT}s: $crd"
                  oc get crd | grep -i shipwright || echo "No Shipwright CRDs found"
                  exit 1
                fi
              done
              
              
              if ! oc get sa "$TEST_E2E_SERVICEACCOUNT_NAME" -n "$OPERATOR_NAMESPACE" >/dev/null 2>&1; then
                oc create sa "$TEST_E2E_SERVICEACCOUNT_NAME" -n "$OPERATOR_NAMESPACE" 2>/dev/null || true
              fi
              
              oc adm policy add-scc-to-user privileged -z "$TEST_E2E_SERVICEACCOUNT_NAME" -n "$OPERATOR_NAMESPACE" || true
              
              # Early strategy patches
              
              # Wait for original production strategies to be available first (before renaming)
              TIMEOUT=180
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                if oc get clusterbuildstrategy buildpacks >/dev/null 2>&1 && \
                   oc get clusterbuildstrategy buildah >/dev/null 2>&1 && \
                   oc get clusterbuildstrategy source-to-image >/dev/null 2>&1; then
                  break
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "ERROR: Original production strategies not available after ${TIMEOUT}s"
                oc get clusterbuildstrategy
                exit 1
              fi
              
              # Rename strategies to match upstream tests
              
              # Rename buildah → buildah-shipwright-managed-push
              if oc get clusterbuildstrategy buildah >/dev/null 2>&1 && ! oc get clusterbuildstrategy buildah-shipwright-managed-push >/dev/null 2>&1; then
                oc get clusterbuildstrategy buildah -o yaml | \
                  sed 's/name: buildah$/name: buildah-shipwright-managed-push/' | \
                  oc apply -f - || echo "Could not rename buildah strategy"
              fi
              
              # Rename buildpacks → buildpacks-v3  
              if oc get clusterbuildstrategy buildpacks >/dev/null 2>&1 && ! oc get clusterbuildstrategy buildpacks-v3 >/dev/null 2>&1; then
                oc get clusterbuildstrategy buildpacks -o yaml | \
                  sed 's/name: buildpacks$/name: buildpacks-v3/' | \
                  oc apply -f - || echo "Could not rename buildpacks strategy"
              fi
              
              # Rename buildpacks-extender → buildpacks-v3-heroku
              if oc get clusterbuildstrategy buildpacks-extender >/dev/null 2>&1 && ! oc get clusterbuildstrategy buildpacks-v3-heroku >/dev/null 2>&1; then
                oc get clusterbuildstrategy buildpacks-extender -o yaml | \
                  sed 's/name: buildpacks-extender$/name: buildpacks-v3-heroku/' | \
                  oc apply -f - || echo "Could not rename buildpacks-extender strategy"
              fi
              
              # source-to-image stays the same (already matches upstream)
              
              # Wait for renamed strategies to be available
              for strategy in "buildah-shipwright-managed-push" "buildpacks-v3" "buildpacks-v3-heroku" "source-to-image"; do
                TIMEOUT=60
                ELAPSED=0
                while [ $ELAPSED -lt $TIMEOUT ]; do
                  if oc get clusterbuildstrategy "$strategy" >/dev/null 2>&1; then
                    break
                  fi
                  sleep 2
                  ELAPSED=$((ELAPSED + 2))
                done
              done
              
              # Patch buildpacks-v3 strategy parameter defaults EARLY  
              if ! oc patch clusterbuildstrategy buildpacks-v3 --type='json' -p='[
                {
                  "op": "replace",
                  "path": "/spec/parameters/1/default",
                  "value": "docker.io/paketobuildpacks/builder-jammy-full:latest"
                }
              ]'; then
                echo "ERROR: Failed to patch buildpacks-v3 strategy"
                exit 1
              fi
              # Patch source-to-image strategy parameter defaults EARLY
              BUILDER_PARAM_EXISTS=$(oc get clusterbuildstrategy source-to-image -o jsonpath='{.spec.parameters[*].name}' | grep -c "builder-image" || echo "0")
              if [ "$BUILDER_PARAM_EXISTS" = "0" ]; then
                oc patch clusterbuildstrategy source-to-image --type='json' -p='[
                  {
                    "op": "add",
                    "path": "/spec/parameters/-",
                    "value": {
                      "name": "builder-image",
                      "description": "The builder image for S2I builds.",
                      "type": "string", 
                      "default": "registry.redhat.io/ubi9/nodejs-18:1"
                    }
                  }
                ]' || echo "Could not add builder-image parameter"
              else
                PARAM_INDEX=$(oc get clusterbuildstrategy source-to-image -o json | jq '.spec.parameters | map(.name) | index("builder-image")')
                if [ "$PARAM_INDEX" != "null" ] && [ -n "$PARAM_INDEX" ]; then
                  oc patch clusterbuildstrategy source-to-image --type='json' -p="[
                    {
                      \"op\": \"add\",
                      \"path\": \"/spec/parameters/$PARAM_INDEX/default\",
                      \"value\": \"registry.redhat.io/ubi9/nodejs-18:1\"
                    }
                  ]" || echo "Could not set builder-image default"
                fi
              fi
              
              # Force strategy cache invalidation - restart controller to pick up patches
              oc rollout restart deployment/shipwright-build-controller -n "$OPERATOR_NAMESPACE" 2>/dev/null || echo "Could not restart controller"
              oc rollout status deployment/shipwright-build-controller -n "$OPERATOR_NAMESPACE" --timeout=300s 2>/dev/null || echo "Controller restart status unknown"
              
              # ==== FIX BUILDPACKS STRATEGY FOR STEP-ANALYZE FAILURES ====
              
              # Add required buildpacks volumes to prevent step-analyze failures
              if oc get clusterbuildstrategy buildpacks-v3 >/dev/null 2>&1; then
                # Patch buildpacks-v3 to add required volumes for analyze step
                oc patch clusterbuildstrategy buildpacks-v3 --type='json' -p='[
                  {
                    "op": "add",
                    "path": "/spec/volumes",
                    "value": [
                      {
                        "name": "layers-dir",
                        "emptyDir": {}
                      },
                      {
                        "name": "cache-dir", 
                        "emptyDir": {}
                      },
                      {
                        "name": "platform-dir",
                        "emptyDir": {}
                      }
                    ]
                  }
                ]' 2>/dev/null || echo "Could not add buildpacks volumes - may already exist"
              fi
              
              # Prepare test files
              rm -rf "$WORK_DIR"
              mkdir -p "$WORK_DIR"
              cp -r /workspace/shipwright-build/test "$WORK_DIR/"
              cp -r /workspace/shipwright-build/samples "$WORK_DIR/"
              cp /workspace/shipwright-build/go.mod "$WORK_DIR/"
              cp /workspace/shipwright-build/go.sum "$WORK_DIR/"
              cp -r /workspace/shipwright-build/pkg "$WORK_DIR/"
              
              # Now overwrite upstream samples with our custom builds/buildruns
              echo "Phase 2: Replacing placeholder with actual registry: $TEST_IMAGE_REPO"
              find /tmp/custom-samples/builds -name "*.yaml" -type f -exec sed -i "s|__TEMP_REGISTRY_PLACEHOLDER__|${TEST_IMAGE_REPO}|g" {} \;
              find /tmp/custom-samples/buildruns -name "*.yaml" -type f -exec sed -i "s|__TEMP_REGISTRY_PLACEHOLDER__|${TEST_IMAGE_REPO}|g" {} \;
              
              # Map custom builds/buildruns to upstream sample filenames
              if [ -f "/tmp/custom-samples/builds/buildah-build.yaml" ]; then
                cp "/tmp/custom-samples/builds/buildah-build.yaml" "$WORK_DIR/samples/v1beta1/build/build_buildah_shipwright_managed_push_cr.yaml"
                cp "/tmp/custom-samples/builds/buildah-build.yaml" "$WORK_DIR/samples/v1beta1/build/build_buildah_strategy_managed_push_cr.yaml"
                cp "/tmp/custom-samples/builds/buildah-build.yaml" "$WORK_DIR/samples/v1beta1/build/build_buildah_cr.yaml"
              fi
              
              if [ -f "/tmp/custom-samples/builds/buildpack-nodejs-build.yaml" ]; then
                cp "/tmp/custom-samples/builds/buildpack-nodejs-build.yaml" "$WORK_DIR/samples/v1beta1/build/build_buildpacks-v3-heroku_cr.yaml"
                cp "/tmp/custom-samples/builds/buildpack-nodejs-build.yaml" "$WORK_DIR/samples/v1beta1/build/build_buildpacks-v3_cr.yaml"
                cp "/tmp/custom-samples/builds/buildpack-nodejs-build.yaml" "$WORK_DIR/samples/v1beta1/build/build_buildpacks-v3-heroku_namespaced_cr.yaml"
                cp "/tmp/custom-samples/builds/buildpack-nodejs-build.yaml" "$WORK_DIR/samples/v1beta1/build/build_buildpacks-v3_namespaced_cr.yaml"
              fi
              
              if [ -f "/tmp/custom-samples/builds/s2i-nodejs-build.yaml" ]; then
                cp "/tmp/custom-samples/builds/s2i-nodejs-build.yaml" "$WORK_DIR/samples/v1beta1/build/build_source-to-image_cr.yaml"
              fi
              
              if [ -f "/tmp/custom-samples/buildruns/buildah-build-buildrun.yaml" ]; then
                cp "/tmp/custom-samples/buildruns/buildah-build-buildrun.yaml" "$WORK_DIR/samples/v1beta1/buildrun/buildrun_buildah_cr.yaml"
                cp "/tmp/custom-samples/buildruns/buildah-build-buildrun.yaml" "$WORK_DIR/samples/v1beta1/buildrun/buildrun_buildah_shipwright_managed_push_cr.yaml"
              fi
              
              if [ -f "/tmp/custom-samples/buildruns/buildpack-nodejs-build-buildrun.yaml" ]; then
                cp "/tmp/custom-samples/buildruns/buildpack-nodejs-build-buildrun.yaml" "$WORK_DIR/samples/v1beta1/buildrun/buildrun_buildpacks-v3-heroku_cr.yaml"
                cp "/tmp/custom-samples/buildruns/buildpack-nodejs-build-buildrun.yaml" "$WORK_DIR/samples/v1beta1/buildrun/buildrun_buildpacks-v3_cr.yaml"
                cp "/tmp/custom-samples/buildruns/buildpack-nodejs-build-buildrun.yaml" "$WORK_DIR/samples/v1beta1/buildrun/buildrun_buildpacks-v3-heroku_namespaced_cr.yaml"
                cp "/tmp/custom-samples/buildruns/buildpack-nodejs-build-buildrun.yaml" "$WORK_DIR/samples/v1beta1/buildrun/buildrun_buildpacks-v3_namespaced_cr.yaml"
              fi
              
              if [ -f "/tmp/custom-samples/buildruns/s2i-nodejs-build-buildrun.yaml" ]; then
                cp "/tmp/custom-samples/buildruns/s2i-nodejs-build-buildrun.yaml" "$WORK_DIR/samples/v1beta1/buildrun/buildrun_source-to-image_cr.yaml"
              fi
              
              # Detect and validate build strategies
              TIMEOUT=120
              ELAPSED=0
              AVAILABLE_STRATEGIES=""
              
              while [ $ELAPSED -lt $TIMEOUT ]; do
                AVAILABLE_STRATEGIES=$(oc get clusterbuildstrategy -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo "")
                if [ -n "$AVAILABLE_STRATEGIES" ]; then
                  break
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "Available ClusterBuildStrategies: $AVAILABLE_STRATEGIES"
              
              FOUND_STRATEGIES=()
              for strategy in "${DOWNSTREAM_BUILD_STRATEGIES[@]}"; do
                if echo "$AVAILABLE_STRATEGIES" | grep -qw "$strategy"; then
                  FOUND_STRATEGIES+=("$strategy")
                fi
              done
              echo "Found strategies: ${FOUND_STRATEGIES[*]}"
              
              if [ ${#FOUND_STRATEGIES[@]} -eq 0 ]; then
                echo "ERROR: No downstream build strategies found in cluster after ${TIMEOUT}s!"
                echo "Expected: ${DOWNSTREAM_BUILD_STRATEGIES[*]}"
                echo "Available: $AVAILABLE_STRATEGIES"
                oc get pods -n $OPERATOR_NAMESPACE
                oc logs -n $OPERATOR_NAMESPACE deployment/shipwright-build-controller --tail=100 2>/dev/null || echo "  Could not get controller logs"
                exit 1
              fi
              
              
              
              # Always deploy dedicated test registry for e2e tests
              oc create namespace registry --dry-run=client -o yaml | oc apply -f -
              
              # Deploy inline test registry if not already exists
              if ! oc get deployment registry -n registry >/dev/null 2>&1; then
                oc apply -f - <<EOF
              ---
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: registry
                namespace: registry
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: registry
                template:
                  metadata:
                    labels:
                      app: registry
                  spec:
                    containers:
                      - image: registry:2
                        name: registry
                        imagePullPolicy: IfNotPresent
                        env:
                        - name: REGISTRY_STORAGE_DELETE_ENABLED
                          value: "true"
                        - name: REGISTRY_AUTH
                          value: "none"
                        - name: REGISTRY_HTTP_SECRET
                          value: "notsecret"
                        ports:
                          - containerPort: 5000
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128M
                          limits:
                            cpu: 100m
                            memory: 128M
                        readinessProbe:
                          httpGet:
                            path: /v2/
                            port: 5000
                          initialDelaySeconds: 5
                          periodSeconds: 5
                        livenessProbe:
                          httpGet:
                            path: /v2/
                            port: 5000
                          initialDelaySeconds: 10
                          periodSeconds: 10
              ---
              apiVersion: v1
              kind: Service
              metadata:
                labels:
                  app: registry
                name: registry
                namespace: registry
              spec:
                ports:
                - name: registry
                  port: 5000
                  protocol: TCP
                  targetPort: 5000
                selector:
                  app: registry
                type: ClusterIP
              EOF
                
                # Wait for registry to be ready
                oc wait --for=condition=Available --timeout=300s deployment/registry -n registry
                oc wait --for=condition=Ready --timeout=120s pod -l app=registry -n registry
              fi
              
              # Verify registry and test connectivity
              sleep 15  # Wait for DNS propagation
              RETRY_COUNT=0
              MAX_RETRIES=10
              
              # First check if registry service exists
              if ! oc get service registry -n registry >/dev/null 2>&1; then
                echo "ERROR: Registry service not found!"
                exit 1
              fi
              
              # Test registry connectivity with retry logic
              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                if oc run registry-test-$RANDOM --image=curlimages/curl:latest --restart=Never -n registry --rm -i --timeout=30s --command -- sh -c "curl -f -m 10 --retry 3 --retry-delay 2 http://registry.registry.svc.cluster.local:5000/v2/ 2>&1" >/dev/null 2>&1; then
                  echo "Registry connectivity test passed"
                  break
                fi
                
                RETRY_COUNT=$((RETRY_COUNT+1))
                echo "Registry test attempt $RETRY_COUNT/$MAX_RETRIES failed"
                if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
                  echo "WARNING: Registry connectivity test failed after $MAX_RETRIES attempts"
                  oc get pods -n registry -l app=registry -o wide || true
                  oc logs -n registry -l app=registry --tail=20 || true
                  break
                fi
                sleep 10
              done
              
              # Add registry URL to /etc/hosts for better DNS resolution
              REGISTRY_IP=$(oc get service registry -n registry -o jsonpath='{.spec.clusterIP}' 2>/dev/null || echo "")
              if [ -n "$REGISTRY_IP" ]; then
                echo "$REGISTRY_IP registry.registry.svc.cluster.local" >> /etc/hosts || echo "Could not update /etc/hosts"
              fi
              
              # Create registry credentials for test framework image validation
              oc create secret generic test-registry-creds \
                --from-literal=.dockerconfigjson='{"auths":{"registry.registry.svc.cluster.local:5000":{"auth":"","username":"","password":""}}}' \
                --type=kubernetes.io/dockerconfigjson \
                -n "$OPERATOR_NAMESPACE" --dry-run=client -o yaml | oc apply -f -
              
              # Link registry credentials to pipeline service account
              oc patch serviceaccount pipeline -n "$OPERATOR_NAMESPACE" -p '{"imagePullSecrets": [{"name": "test-registry-creds"}]}' 2>/dev/null || echo "Could not patch SA with registry creds"
              
              # Set environment variable for test framework to use anonymous registry access
              export TEST_IMAGE_REPO_ANONYMOUS="true"
              
              # Update all registry references to use our test registry
              echo "Phase 3: Replacing registry references in upstream samples"
              find "$WORK_DIR/samples" -name "*.yaml" -type f -exec sed -i "s|image-registry\.openshift-image-registry\.svc:5000/[^/:]*/|${TEST_IMAGE_REPO}/|g" {} \;
              find "$WORK_DIR/samples" -name "*.yaml" -type f -exec sed -i "s|registry\.registry\.svc\.cluster\.local:5000/[^/:]*/|${TEST_IMAGE_REPO}/|g" {} \;
              find "$WORK_DIR/samples" -name "*.yaml" -type f -exec sed -i "s|ttl\.sh/\([^:]*\)|${TEST_IMAGE_REPO}/\1|g" {} \;
              find "$WORK_DIR/samples" -name "*.yaml" -type f -exec sed -i "s|quay\.io/[^/:]*/|${TEST_IMAGE_REPO}/|g" {} \;
              find "$WORK_DIR/samples" -name "*.yaml" -type f -exec sed -i "s|docker\.io/[^/:]*/|${TEST_IMAGE_REPO}/|g" {} \;
              
              # Skip unavailable strategies
              # Skip kaniko tests - not available in production operator
              find "$WORK_DIR/samples" -name "*.yaml" -type f -exec sed -i 's|name: kaniko|name: SKIP-kaniko-not-available|g' {} \;
              find "$WORK_DIR/samples/v1beta1/buildstrategy" -name "*.yaml" -type f -exec sed -i 's|name: kaniko|name: SKIP-kaniko-not-available|g' {} \;
              
              # Ensure all use ClusterBuildStrategy (not namespaced BuildStrategy)
              find "$WORK_DIR/samples" -name "*.yaml" -type f -exec sed -i 's|kind: BuildStrategy|kind: ClusterBuildStrategy|g' {} \;
              
              
              # Fix service account generation
              
              # Apply safe sed commands and environment variables
              export TEST_E2E_SERVICEACCOUNT_NAME="pipeline"
              
              # Test Go compilation and apply service account fixes
              cd "$WORK_DIR/test/e2e/v1beta1"
              if ! go test -c . >/dev/null 2>&1; then
                echo "ERROR: Baseline Go compilation failed"
                go test -c . 2>&1 | head -5
                exit 1
              fi
              
              # Apply service account fixes
              find "$WORK_DIR/test" -name "*.go" -type f -exec sed -i 's|\.GenerateServiceAccount()||g' {} \;
              find "$WORK_DIR/test" -name "*.go" -type f -exec sed -i 's|"\.generate"|"pipeline"|g' {} \;
              sed -i 's|if serviceAccountName == "generated"|if false|g' "$WORK_DIR/test/e2e/v1beta1/validators_test.go" 2>/dev/null
              
              # Verify compilation after fixes
              if ! go test -c . >/dev/null 2>&1; then
                echo "ERROR: Service account fixes broke Go compilation"
                go test -c . 2>&1 | head -5
                exit 1
              fi
              
              
              # Ensure BuildRun YAML files use pipeline service account
              find "$WORK_DIR/samples" -name "buildrun*.yaml" -type f -exec sed -i '/serviceAccount:/d' {} \;
              find "$WORK_DIR/samples" -name "buildrun*.yaml" -type f -exec sed -i '/spec:/a\  serviceAccount: pipeline' {} \;
              
              # Force ALL Build YAMLs to use pipeline service account too
              find "$WORK_DIR/samples" -name "build*.yaml" -type f -exec sed -i '/serviceAccount:/d' {} \;
              find "$WORK_DIR/samples" -name "build*.yaml" -type f -exec sed -i '/spec:/a\  serviceAccount: pipeline' {} \;
              
              # Set timeout environment variables
              export TEST_E2E_TIMEOUT_MULTIPLIER="5"
              export TEST_BUILD_TIMEOUT="1800s" 
              export TEST_POLL_TIMEOUT="30s"
              
              # Fix registry connectivity
              cd "$WORK_DIR"
              
              # Environment variables for registry
              export TEST_IMAGE_REPO="${TEST_IMAGE_REPO}"
              export TEST_REGISTRY_URL="http://registry.registry.svc.cluster.local:5000"
              export TEST_REGISTRY_INSECURE="true"
              export TEST_REGISTRY_PLAIN_HTTP="true"
              export TEST_SKIP_IMAGE_DIGEST_VALIDATION="false"  # Will be set based on registry access test
              
              # Apply registry and kaniko fixes
              find "$WORK_DIR/test" -name "*.go" -type f -exec sed -i 's|localhost:5000|registry.registry.svc.cluster.local:5000|g' {} \;
              find "$WORK_DIR/test" -name "*.go" -type f -exec sed -i 's|"localhost"|"registry.registry.svc.cluster.local"|g' {} \;
              find "$WORK_DIR/test" -type f -name "*.go" -exec sed -i 's|"https://registry\.registry\.svc\.cluster\.local:5000"|"http://registry.registry.svc.cluster.local:5000"|g' {} \;
              find "$WORK_DIR/test" -name "*.go" -type f -exec sed -i 's|"kaniko"|"SKIP-kaniko-not-available"|g' {} \;
              
              # Final compilation check
              cd "$WORK_DIR/test/e2e/v1beta1"
              if ! go test -c . >/dev/null 2>&1; then
                echo "ERROR: Registry/kaniko fixes broke Go compilation"
                go test -c . 2>&1
                exit 1
              fi
              
              # Add insecure registry settings for buildah and buildpacks
              find "$WORK_DIR/samples" -name "*.yaml" -type f -exec sed -i '/dockerfile:/a\    - --tls-verify=false' {} \; 2>/dev/null || true
              find "$WORK_DIR/samples" -name "*.yaml" -type f -exec sed -i '/buildah bud/a\          - --tls-verify=false' {} \; 2>/dev/null || true
              
              # Build test filters and run tests
              cd "$WORK_DIR/test/e2e/v1beta1"
              SKIP_FILTERS=""
              
              # Add skip labels for unsupported features
              for skip_label in "${SKIP_TEST_LABELS[@]}"; do
                if [ -z "$SKIP_FILTERS" ]; then
                  SKIP_FILTERS="!$skip_label"
                else
                  SKIP_FILTERS="$SKIP_FILTERS && !$skip_label"
                fi
              done
              
              # Skip unavailable strategies - only skip what we don't have
              UNAVAILABLE_STRATEGIES=("kaniko" "ko" "buildkit") # Skip these - not in production operator
              for strategy in "${UNAVAILABLE_STRATEGIES[@]}"; do
                  STRATEGY_LABEL=$(echo "$strategy" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2));}1' | sed 's/ //g')
                  SKIP_FILTERS="$SKIP_FILTERS && !$STRATEGY_LABEL"
              done
              
              # Validate fixes before running tests
              
              # Validate strategy parameter patches
              BUILDPACKS_DEFAULT=$(oc get clusterbuildstrategy buildpacks-v3 -o jsonpath='{.spec.parameters[1].default}' 2>/dev/null || echo "ERROR")
              if [ "$BUILDPACKS_DEFAULT" = "docker.io/paketobuildpacks/builder-jammy-full:latest" ]; then
                echo "PASS: Buildpacks-v3 cnb-builder-image parameter correctly patched"
              else
                echo "FAIL: Buildpacks-v3 cnb-builder-image parameter patch FAILED: '$BUILDPACKS_DEFAULT'"
              fi
              
              S2I_HAS_BUILDER=$(oc get clusterbuildstrategy source-to-image -o jsonpath='{.spec.parameters[*].name}' 2>/dev/null | grep -c "builder-image" || echo "0")
              if [ "$S2I_HAS_BUILDER" -gt 0 ]; then
                echo "PASS: Source-to-image builder-image parameter exists"
              else
                echo "FAIL: Source-to-image builder-image parameter MISSING"
              fi
              
              # Validate pipeline service account
              if ! oc get sa "$TEST_E2E_SERVICEACCOUNT_NAME" -n "$OPERATOR_NAMESPACE" >/dev/null 2>&1; then
                echo "ERROR: Pipeline service account MISSING: $TEST_E2E_SERVICEACCOUNT_NAME"
                exit 1
              fi
              
              
              # Run tests
              echo "Running e2e tests: $BUILD_COUNT builds, ${#FOUND_STRATEGIES[@]} strategies"
              
              # Pre-test verification
              oc get clusterbuildstrategy -o name 2>/dev/null >/dev/null || echo "WARN: Could not list strategies"
              
              # Test registry access for image validation
              echo "Testing registry access for image validation..."
              if timeout 10s oc run test-registry-access-$RANDOM --image=curlimages/curl:latest --restart=Never -n "$OPERATOR_NAMESPACE" --rm -i --timeout=30s --command -- sh -c "curl -f --max-time 5 http://registry.registry.svc.cluster.local:5000/v2/ 2>/dev/null" >/dev/null 2>&1; then
                echo "PASS: Registry accessible for image validation"
                export TEST_E2E_SKIP_IMAGE_DIGEST_VALIDATION="false"
                export TEST_SKIP_IMAGE_DIGEST_VALIDATION="false"
              else
                echo "WARN: Registry not accessible for image validation - will skip digest validation"
                export TEST_E2E_SKIP_IMAGE_DIGEST_VALIDATION="true"
                export TEST_SKIP_IMAGE_DIGEST_VALIDATION="true"
              fi
              
              # Verify fixes
              cd "$WORK_DIR/test/e2e/v1beta1"
              REMAINING_SA_CALLS=$(find "$WORK_DIR/test" -name "*.go" -type f -exec grep -l "GenerateServiceAccount()" {} \; 2>/dev/null | wc -l)
              if [ $REMAINING_SA_CALLS -gt 0 ]; then
                echo "WARN: $REMAINING_SA_CALLS files still contain GenerateServiceAccount() calls"
              fi
              
              set +e
              # Run tests with better timeout and parallelism settings
              ginkgo -v --timeout="$TEST_TIMEOUT" --label-filter="$SKIP_FILTERS" --flake-attempts=2 --poll-progress-after=30s . 2>&1 | tee /tmp/test-output.log
              TEST_EXIT_CODE=${PIPESTATUS[0]}
              set -e
              
              # Post-test diagnostics on failure
              if [ $TEST_EXIT_CODE -ne 0 ]; then
                echo "BuildRun status:"
                oc get buildruns -n "$OPERATOR_NAMESPACE" -o wide 2>/dev/null || echo "Could not get BuildRuns"
                echo "Recent events:"
                oc get events -n "$OPERATOR_NAMESPACE" --sort-by='.lastTimestamp' | tail -20 2>/dev/null || echo "Could not get events"
              fi
              
              exit $TEST_EXIT_CODE
