apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: e2e-openshift-builds
spec:
  description: |
    An integration test which provisions an ephemeral Hypershift cluster and deploys an Operator
    bundle from a Konflux snapshot. Enhanced with custom rh-operator builds and auto-generated BuildRuns.
  params:
    - name: SNAPSHOT
      type: string
      description: Snapshot of the application
      default: '{"components": [{"name":"test-app", "containerImage":
        "quay.io/example/repo:latest"}]}'
    - name: VERSION
      type: string
      description: Builds for OpenShift Version
      default: ""
    - name: BUILDS_SAMPLES_REPO
      type: string
      description: Builds samples repository URL
      default: "https://github.com/redhat-openshift-builds/builds-samples.git"
    - name: BUILDS_SAMPLES_BRANCH
      type: string
      description: Builds samples branch
      default: "main"
    - name: SHIPWRIGHT_BUILD_REPO
      type: string
      description: Shipwright build repository URL
      default: "https://github.com/shipwright-io/build.git"
    - name: SHIPWRIGHT_BUILD_BRANCH
      type: string
      description: Shipwright build branch
      default: "main"
    - name: TASKS_REPO_URL
      type: string
      description: Git repository URL containing the e2e task definitions
      default: "https://github.com/redhat-openshift-builds/release.git"
    - name: TASKS_REPO_REVISION
      type: string
      description: Git revision (branch/tag/commit) for the e2e task definitions
      default: "main"
  tasks:
    - name: provision-eaas-space
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
    - name: validate-snapshot
      description: Verify snapshot images exist and bundle relatedImages match
        (fail-fast before cluster)
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.TASKS_REPO_URL)
          - name: revision
            value: $(params.TASKS_REPO_REVISION)
          - name: pathInRepo
            value: tasks/e2e-validate-snapshot.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
    - name: provision-cluster
      runAfter:
        - provision-eaas-space
        - validate-snapshot
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.TASKS_REPO_URL)
          - name: revision
            value: $(params.TASKS_REPO_REVISION)
          - name: pathInRepo
            value: tasks/e2e-provision-cluster.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: imageContentSources
          value: |
            - source: registry.redhat.io/openshift-builds/openshift-builds-rhel9-operator
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-operator$(params.VERSION)
            - source: registry.redhat.io/openshift-builds/openshift-builds-operator-bundle
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-operator-bundle$(params.VERSION)
            - source: registry.redhat.io/openshift-builds/openshift-builds-controller-rhel9
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-controller$(params.VERSION)
            - source: registry.redhat.io/openshift-builds/openshift-builds-image-processing-rhel9
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-image-processing$(params.VERSION)
            - source: registry.redhat.io/openshift-builds/openshift-builds-image-bundler-rhel9
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-image-bundler$(params.VERSION)
            - source: registry.redhat.io/openshift-builds/openshift-builds-git-cloner-rhel9
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-git-cloner$(params.VERSION)
            - source: registry.redhat.io/openshift-builds/openshift-builds-waiters-rhel9
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-waiter$(params.VERSION)
            - source: registry.redhat.io/openshift-builds/openshift-builds-webhook-rhel9
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-webhook$(params.VERSION)
            - source: registry.redhat.io/openshift-builds/openshift-builds-shared-resource-rhel9
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-shared-resource$(params.VERSION)
            - source: registry.redhat.io/openshift-builds/openshift-builds-shared-resource-webhook-rhel9
              mirrors:
                - quay.io/redhat-user-workloads/rh-openshift-builds-tenant/openshift-builds-shared-resource-webhook$(params.VERSION)
    - name: verify-fips-enabled-on-nodes
      description: Verify that FIPS is enabled on cluster nodes
      runAfter:
        - provision-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.TASKS_REPO_URL)
          - name: revision
            value: $(params.TASKS_REPO_REVISION)
          - name: pathInRepo
            value: tasks/e2e-verify-fips.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
    - name: install-openshift-pipelines
      runAfter:
        - provision-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.TASKS_REPO_URL)
          - name: revision
            value: $(params.TASKS_REPO_REVISION)
          - name: pathInRepo
            value: tasks/e2e-install-openshift-pipelines.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
    - name: deploy-and-verify-operator
      description: Deploy operator and verify operands and CR status
      runAfter:
        - verify-fips-enabled-on-nodes
        - install-openshift-pipelines
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.TASKS_REPO_URL)
          - name: revision
            value: $(params.TASKS_REPO_REVISION)
          - name: pathInRepo
            value: tasks/e2e-deploy-operator.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
    - name: verify-images
      description: Verify snapshot images, bundle relatedImages, and running operands
      runAfter:
        - deploy-and-verify-operator
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.TASKS_REPO_URL)
          - name: revision
            value: $(params.TASKS_REPO_REVISION)
          - name: pathInRepo
            value: tasks/e2e-verify-images.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
    - name: run-e2e-tests
      description: Clone Shipwright repo and run e2e tests against deployed operator
      runAfter:
        - verify-images
      timeout: "3h"
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.TASKS_REPO_URL)
          - name: revision
            value: $(params.TASKS_REPO_REVISION)
          - name: pathInRepo
            value: tasks/e2e-run-tests.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: BUILDS_SAMPLES_REPO
          value: $(params.BUILDS_SAMPLES_REPO)
        - name: BUILDS_SAMPLES_BRANCH
          value: $(params.BUILDS_SAMPLES_BRANCH)
        - name: SHIPWRIGHT_BUILD_REPO
          value: $(params.SHIPWRIGHT_BUILD_REPO)
        - name: SHIPWRIGHT_BUILD_BRANCH
          value: $(params.SHIPWRIGHT_BUILD_BRANCH)
